version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5002:5002"
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/chatapp
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
